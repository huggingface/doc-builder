name: Upload PR documentation

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      hub_base_path:
        type: string
      repo_owner:
        type: string
        default: 'huggingface'
        description: "Owner of the repo to build documentation for. Defaults to 'huggingface'."
    secrets:
      hf_token:
        required: true
      comment_bot_token: #legacy, will be removed in the future
        required: false
      comment_bot_app_id:
        required: false
      comment_bot_secret_pem:
        required: false

jobs:
  upload_pr_documentation:
    runs-on: ubuntu-22.04
    if: >
      (github.event.workflow_run.event == 'pull_request' ||
      github.event.workflow_run.event == 'pull_request_target' ||
      github.event.workflow_run.event == 'workflow_dispatch') &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: 'huggingface/doc-builder'
          path: doc-builder
          # Uncomment the following line to use a specific revision of doc-builder
          # ref: fix-corrupted-zip

      - name: Setup environment
        shell: bash
        id: setup-env
        run: |
          pip install black
          cd doc-builder
          pip install .
          cd ..
          echo "current_work_dir=$(pwd)" >> $GITHUB_OUTPUT

      - name: 'Download artifact'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: doc-build-artifact
          path: ${{ github.workspace }}/build_dir
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{github.event.workflow_run.id }}

      - name: Display structure of downloaded files
        run: ls -l

      - name: Get commit_sha & pr_number
        id: github-context
        run: |
          content_commit_sha=$(cat ./build_dir/commit_sha)
          if [[ $content_commit_sha =~ ^[0-9a-zA-Z]{40}$ ]]; then
            echo "commit_sha=$content_commit_sha" >> $GITHUB_OUTPUT
            rm -rf ./build_dir/commit_sha
          else
            echo "Encountered an invalid commit_sha"
            exit 1
          fi

          content_pr_number=$(cat ./build_dir/pr_number)
          if [[ $content_pr_number =~ ^[0-9]+$ ]]; then
            echo "pr_number=$content_pr_number" >> $GITHUB_OUTPUT
            rm -rf ./build_dir/pr_number
          else
            echo "Encountered an invalid pr_number"
            exit 1
          fi

      - name: Get warning status
        id: warning-context
        run: |
          if [ -f ./build_dir/warnings_emitted ]; then
            content_warnings_emitted=$(cat ./build_dir/warnings_emitted)
            rm -rf ./build_dir/warnings_emitted
          else
            content_warnings_emitted=false
          fi

          if [[ $content_warnings_emitted =~ ^(true|false)$ ]]; then
            echo "warnings_emitted=$content_warnings_emitted" >> $GITHUB_OUTPUT
          else
            echo "Encountered an invalid warnings_emitted value"
            exit 1
          fi

      - name: Set hub_docs_url
        id: hfhub-context
        env:
          HUB_BASE_PATH: ${{ inputs.hub_base_path }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          PR_NUMBER: ${{ steps.github-context.outputs.pr_number }}
        run: |
          if [ -z "$HUB_BASE_PATH" ]
          then
            echo "hub_docs_url=https://moon-ci-docs.huggingface.co/docs/${PACKAGE_NAME}/pr_${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "hub_base_path not provided, defaulting to https://moon-ci-docs.huggingface.co/docs"
          else
            echo "hub_docs_url=${HUB_BASE_PATH}/${PACKAGE_NAME}/pr_${PR_NUMBER}" >> $GITHUB_OUTPUT
          fi

      - name: Compose doc comment message
        id: doc-comment
        env:
          WARNINGS_EMITTED: ${{ steps.warning-context.outputs.warnings_emitted }}
          HUB_DOCS_URL: ${{ steps.hfhub-context.outputs.hub_docs_url }}
        run: |
          warning_message=""
          if [ "$WARNINGS_EMITTED" = "true" ]; then
            warning_message=" Some warnings were emitted during doc build; check the workflow logs for details."
          fi

          {
            echo "message<<EOF"
            echo "The docs for this PR live [here](${HUB_DOCS_URL}). All of your documentation changes will be reflected on that endpoint. The docs are available until 30 days after the last update.${warning_message}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Sync to bucket
        shell: bash
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          HF_TOKEN: ${{ secrets.hf_token }}
        run: |
          cd build_dir
          pip install -U huggingface_hub
          hf sync "./$PACKAGE_NAME" "hf://buckets/hf-doc-build/doc-dev/$PACKAGE_NAME"

      - name: Find doc comment
        uses: peter-evans/find-comment@a54c31d7fa095754bfef525c0c8e5e5674c4b4b1  # v2
        id: find_comment
        with:
          issue-number: ${{ steps.github-context.outputs.pr_number }}
          body-includes: docs for this PR

      - name: Determine authentication method
        id: auth
        env:
          COMMENT_BOT_TOKEN: ${{ secrets.comment_bot_token }}
          COMMENT_BOT_APP_ID: ${{ secrets.comment_bot_app_id }}
        run: |
          if [[ -n "$COMMENT_BOT_TOKEN" ]]; then
            echo "method=comment_bot_token" >> $GITHUB_OUTPUT
          elif [[ -n "$COMMENT_BOT_APP_ID" ]]; then
            echo "method=github_app" >> $GITHUB_OUTPUT
          else
            echo "No authentication method provided"
            exit 1
          fi

      - name: Create comment_bot token
        id: comment_bot_token
        if: steps.auth.outputs.method == 'github_app'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        with:
          app-id: ${{ secrets.comment_bot_app_id }}
          private-key: ${{ secrets.comment_bot_secret_pem }}
          repositories: ${{ github.event.repository.name }}

      - name: Add doc comment if not present
        uses: thollander/actions-comment-pull-request@fabd468d3a1a0b97feee5f6b9e499eab0dd903f6  # v2
        if: steps.find_comment.outputs.comment-id == ''
        with:
          message: ${{ steps.doc-comment.outputs.message }}
          pr_number: ${{ steps.github-context.outputs.pr_number }}
          GITHUB_TOKEN: ${{ steps.auth.outputs.method == 'comment_bot_token' && secrets.comment_bot_token || steps.comment_bot_token.outputs.token }}

      - name: Update doc comment if necessary
        if: steps.find_comment.outputs.comment-id != '' && (github.event.action == 'reopened' || steps.find_comment.outputs.comment-body != steps.doc-comment.outputs.message)
        uses: peter-evans/create-or-update-comment@a35cf36e5301d70b76f316e867e7788a55a31dae  # v1
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          token: ${{ steps.auth.outputs.method == 'comment_bot_token' && secrets.comment_bot_token || steps.comment_bot_token.outputs.token }}
          edit-mode: replace
          body: ${{ steps.doc-comment.outputs.message }}
